[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci && npm run build"
]

[start]
cmd = "php artisan storage:link && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && (php artisan queue:listen --tries=3 & php artisan serve --host=0.0.0.0 --port=$PORT)"